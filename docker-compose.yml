services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: dc-check-app:latest
    container_name: dccheck_app
    restart: always
    ports:
      - "0.0.0.0:3001:3001"
    env_file:
      - .env.production
    environment:
      PORT: "3001"
      HOSTNAME: "0.0.0.0"
    volumes:
      - dccheck_uploads:/app/public/uploads
    depends_on:
      db:
        condition: service_started
    networks:
      - dccheck_net

  syslog-receiver:
    image: dc-check-app:latest
    container_name: dccheck_syslog_receiver
    restart: unless-stopped
    command: npm run syslog:receiver
    ports:
      - "0.0.0.0:514:1514/udp"
    env_file:
      - .env.production
    environment:
      SYSLOG_UDP_HOST: "0.0.0.0"
      SYSLOG_UDP_PORT: "1514"
    depends_on:
      db:
        condition: service_started
    networks:
      - dccheck_net

  siem-parser:
    image: dc-check-app:latest
    container_name: dccheck_siem_parser
    restart: unless-stopped
    command: npm run siem:parser
    env_file:
      - .env.production
    depends_on:
      db:
        condition: service_started
    networks:
      - dccheck_net

  siem-rules:
    image: dc-check-app:latest
    container_name: dccheck_siem_rules
    restart: unless-stopped
    command: npm run siem:rules
    env_file:
      - .env.production
    depends_on:
      db:
        condition: service_started
    networks:
      - dccheck_net

  siem-alerts:
    image: dc-check-app:latest
    container_name: dccheck_siem_alerts
    restart: unless-stopped
    command: npm run siem:alerts
    env_file:
      - .env.production
    depends_on:
      db:
        condition: service_started
    networks:
      - dccheck_net

  siem-retention:
    image: dc-check-app:latest
    container_name: dccheck_siem_retention
    restart: unless-stopped
    command: npm run siem:retention
    env_file:
      - .env.production
    depends_on:
      db:
        condition: service_started
    networks:
      - dccheck_net

  db:
    image: postgres:15-alpine
    container_name: dccheck_postgres
    restart: always
    env_file:
      - .env.production
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "0.0.0.0:3002:5432"
    volumes:
      - dccheck_pgdata:/var/lib/postgresql/data
    networks:
      - dccheck_net

volumes:
  dccheck_pgdata:
  dccheck_uploads:


networks:
  dccheck_net:
    driver: bridge
