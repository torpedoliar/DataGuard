services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # SESSION_SECRET is required at build time (next collects page data
        # and validates env via zod). Reuse the same value as runtime so the
        # server doesn't see a different key after restart.
        # Compose passes the build arg through from the env file via the
        # ${SESSION_SECRET} interpolation below, but we keep the literal here
        # so build works even when the env file is .env (not .env.production).
        SESSION_SECRET: ${SESSION_SECRET:?SESSION_SECRET must be set in the env file used by compose}
        # AI_KEY_ENCRYPTION_SECRET — N49 encryption secret, validated the same
        # way as SESSION_SECRET during the build. Pass it through as a build
        # arg or the build aborts with "AI_KEY_ENCRYPTION_SECRET: required in
        # production".
        AI_KEY_ENCRYPTION_SECRET: ${AI_KEY_ENCRYPTION_SECRET:?AI_KEY_ENCRYPTION_SECRET must be set in the env file used by compose}
    image: dc-check-app:latest
    container_name: dccheck_app
    restart: always
    ports:
      - "0.0.0.0:3001:3001"
    env_file:
      - .env.production
    environment:
      PORT: "3001"
      HOSTNAME: "0.0.0.0"
    volumes:
      - dccheck_uploads:/app/public/uploads
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/api/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    depends_on:
      db:
        condition: service_healthy
    networks:
      - dccheck_net

  syslog-receiver:
    image: dc-check-app:latest
    container_name: dccheck_syslog_receiver
    restart: unless-stopped
    command: npm run syslog:receiver
    ports:
      - "0.0.0.0:514:1514/udp"
      - "0.0.0.0:${SYSLOG_TCP_PORT:-601}:1515/tcp"
      - "0.0.0.0:${SYSLOG_TLS_PORT:-6514}:1516/tcp"
    env_file:
      - .env.production
    environment:
      SYSLOG_UDP_HOST: "0.0.0.0"
      SYSLOG_UDP_PORT: "1514"
      SYSLOG_TCP_PORT: "${SYSLOG_TCP_PORT:-1515}"
      SYSLOG_TLS_PORT: "${SYSLOG_TLS_PORT:-1516}"
      TLS_CERT_PATH: "${TLS_CERT_PATH:-/etc/siem/tls/cert.pem}"
      TLS_KEY_PATH: "${TLS_KEY_PATH:-/etc/siem/tls/key.pem}"
    volumes:
      - dccheck_si_tls:/etc/siem/tls:ro
    depends_on:
      db:
        condition: service_healthy
    networks:
      - dccheck_net

  siem-parser:
    image: dc-check-app:latest
    container_name: dccheck_siem_parser
    restart: unless-stopped
    command: npm run siem:parser
    env_file:
      - .env.production
    depends_on:
      db:
        condition: service_healthy
    networks:
      - dccheck_net

  siem-rules:
    image: dc-check-app:latest
    container_name: dccheck_siem_rules
    restart: unless-stopped
    command: npm run siem:rules
    env_file:
      - .env.production
    depends_on:
      db:
        condition: service_healthy
    networks:
      - dccheck_net

  siem-alerts:
    image: dc-check-app:latest
    container_name: dccheck_siem_alerts
    restart: unless-stopped
    command: npm run siem:alerts
    env_file:
      - .env.production
    depends_on:
      db:
        condition: service_healthy
    networks:
      - dccheck_net

  siem-ai:
    image: dc-check-app:latest
    container_name: dccheck_siem_ai
    restart: unless-stopped
    command: npm run siem:ai
    env_file:
      - .env.production
    depends_on:
      app:
        condition: service_healthy
    networks:
      - dccheck_net

  siem-retention:
    image: dc-check-app:latest
    container_name: dccheck_siem_retention
    restart: unless-stopped
    command: npm run siem:retention
    env_file:
      - .env.production
    depends_on:
      db:
        condition: service_healthy
    networks:
      - dccheck_net

  siem-snapshot:
    image: dc-check-app:latest
    container_name: dccheck_siem_snapshot
    restart: unless-stopped
    command: npm run siem:snapshot
    env_file:
      - .env.production
    depends_on:
      db:
        condition: service_healthy
    networks:
      - dccheck_net

  incidents-overdue-notify:
    image: dc-check-app:latest
    container_name: dccheck_incidents_overdue_notify
    restart: unless-stopped
    command: npm run incidents:notify-overdue:loop
    env_file:
      - .env.production
    depends_on:
      app:
        condition: service_healthy
    networks:
      - dccheck_net

  backup-scheduler:
    image: dc-check-app:latest
    container_name: dccheck_backup_scheduler
    restart: unless-stopped
    command: npm run backup:scheduler
    env_file:
      - .env.production
    environment:
      BACKUP_DIR: /backups
      BACKUP_SCHEDULE_HOURS: "24"
      BACKUP_RETENTION_DAILY: "7"
      BACKUP_RETENTION_WEEKLY: "4"
      BACKUP_RETENTION_MONTHLY: "12"
    depends_on:
      app:
        condition: service_healthy
    volumes:
      - dccheck_backups:/backups
    networks:
      - dccheck_net

  db:
    image: postgres:15-alpine
    container_name: dccheck_postgres
    restart: always
    env_file:
      - .env.production
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "0.0.0.0:3002:5432"
    volumes:
      - dccheck_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-administrator} -d ${DB_NAME:-dccheck}"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s
    networks:
      - dccheck_net

volumes:
  dccheck_pgdata:
  dccheck_uploads:
  dccheck_backups:
  dccheck_si_tls:


networks:
  dccheck_net:
    driver: bridge
