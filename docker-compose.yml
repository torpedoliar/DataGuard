version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: dc-check-app:latest
    container_name: dccheck_app
    restart: always
    ports:
      - "0.0.0.0:3001:3001"
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_USER: administrator
      DB_PASSWORD: "Arabika1927"
      DB_NAME: dccheck
      SESSION_SECRET: fe5cae864dfd8e1445580fdd5b1c5f9e
      PORT: "3001"
      HOSTNAME: "0.0.0.0"
    volumes:
      - dccheck_uploads:/app/public/uploads
    depends_on:
      db:
        condition: service_started
    networks:
      - dccheck_net

  syslog-receiver:
    image: dc-check-app:latest
    container_name: dccheck_syslog_receiver
    restart: unless-stopped
    command: npm run syslog:receiver
    ports:
      - "0.0.0.0:514:1514/udp"
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_USER: administrator
      DB_PASSWORD: "Arabika1927"
      DB_NAME: dccheck
      SYSLOG_UDP_HOST: "0.0.0.0"
      SYSLOG_UDP_PORT: "1514"
    depends_on:
      db:
        condition: service_started
    networks:
      - dccheck_net

  siem-parser:
    image: dc-check-app:latest
    container_name: dccheck_siem_parser
    restart: unless-stopped
    command: npm run siem:parser
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_USER: administrator
      DB_PASSWORD: "Arabika1927"
      DB_NAME: dccheck
    depends_on:
      db:
        condition: service_started
    networks:
      - dccheck_net

  siem-rules:
    image: dc-check-app:latest
    container_name: dccheck_siem_rules
    restart: unless-stopped
    command: npm run siem:rules
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_USER: administrator
      DB_PASSWORD: "Arabika1927"
      DB_NAME: dccheck
    depends_on:
      db:
        condition: service_started
    networks:
      - dccheck_net

  siem-alerts:
    image: dc-check-app:latest
    container_name: dccheck_siem_alerts
    restart: unless-stopped
    command: npm run siem:alerts
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_USER: administrator
      DB_PASSWORD: "Arabika1927"
      DB_NAME: dccheck
    depends_on:
      db:
        condition: service_started
    networks:
      - dccheck_net

  siem-retention:
    image: dc-check-app:latest
    container_name: dccheck_siem_retention
    restart: unless-stopped
    command: npm run siem:retention
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_USER: administrator
      DB_PASSWORD: "Arabika1927"
      DB_NAME: dccheck
    depends_on:
      db:
        condition: service_started
    networks:
      - dccheck_net

  db:
    image: postgres:15-alpine
    container_name: dccheck_postgres
    restart: always
    environment:
      POSTGRES_USER: administrator
      POSTGRES_PASSWORD: "Arabika1927"
      POSTGRES_DB: dccheck
    ports:
      - "0.0.0.0:3002:5432"
    volumes:
      - dccheck_pgdata:/var/lib/postgresql/data
    networks:
      - dccheck_net

volumes:
  dccheck_pgdata:
  dccheck_uploads:


networks:
  dccheck_net:
    driver: bridge
